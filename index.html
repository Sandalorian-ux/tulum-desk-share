<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tulum DESK — Screen Share</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 800px at 50% -10%, #10202b 0%, #070a0e 60%, #04060a 100%);
    color: #eaffff; font: 16px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
  }
  .card {
    width: min(560px, 92vw); padding: 34px 30px 28px; border-radius: 18px;
    background: rgba(12, 20, 28, 0.86); border: 1px solid #16323f;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center;
  }
  h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 0.5px; }
  h1 .accent { color: #5fb8cc; }
  .sub { margin: 0 0 22px; color: #7fa6b3; font-size: 13px; }
  button {
    font: 600 17px system-ui, sans-serif; color: #eaffff; cursor: pointer;
    border: 1px solid #5fb8cc; border-radius: 12px; padding: 15px 22px; margin: 6px;
    background: linear-gradient(#164254, #0e2c3a); transition: transform .08s, filter .15s;
    min-width: 170px;
  }
  button:hover { filter: brightness(1.15); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: default; filter: none; }
  #stop { border-color: #7a3a3a; background: linear-gradient(#4a1f1f, #331616); }
  .modeToggle { margin: 4px 0 0; }
  .modeToggle button {
    min-width: 84px; padding: 8px 16px; font: 600 13px system-ui, sans-serif; opacity: 0.5; margin: 4px 3px;
  }
  .modeToggle button.active { opacity: 1; border-color: #35d67a; background: linear-gradient(#164254, #103a2c); }
  .status {
    margin-top: 20px; padding: 12px 14px; border-radius: 10px; font-size: 14px;
    background: #0a1620; border: 1px solid #16323f; min-height: 20px;
    color: #8fd6e6; word-break: break-word;
  }
  .status.ok { color: #7fe6a8; border-color: #1f6b45; }
  .status.err { color: #ff9a9a; border-color: #7a2323; }
  .status.warn { color: #ffd98f; border-color: #7a6423; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; vertical-align: middle; background: #446; }
  .dot.live { background: #35d67a; box-shadow: 0 0 8px #35d67a; }
  .dot.wait { background: #e0c05a; }
  .dot.err { background: #d65a5a; }
  .meta { margin-top: 14px; font-size: 11px; color: #557; }
  code { color: #9fd; background: #0c1a24; padding: 1px 5px; border-radius: 4px; }
  .log {
    margin-top: 12px; font: 11px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; color: #6fa88f;
    text-align: left; max-height: 150px; overflow-y: auto; background: #08131b; border: 1px solid #12303a;
    border-radius: 8px; padding: 8px 10px; white-space: pre-wrap; word-break: break-word;
  }
  .log:empty { display: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Tulum <span class="accent">DESK</span> — Screen Share</h1>
    <p class="sub">Share this machine's screen into the Tulum venue (peer-to-peer, LAN).</p>
    <div>
      <button id="share">Share Screen</button>
      <button id="stop" disabled>Stop</button>
    </div>
    <div class="modeToggle">
      <button id="modeText" class="active" type="button">TEXT</button>
      <button id="modeVideo" type="button">VIDEO</button>
    </div>
    <div id="status" class="status"><span class="dot" id="dot"></span><span id="msg">Idle — click “Share Screen” to begin.</span></div>
    <div class="meta">role <code>sharer</code> · signal <code id="base">…</code></div>
    <div class="meta" id="quality">capture — · sender cap —</div>
    <div id="log" class="log"></div>
  </div>

<script>
"use strict";
// ── SIGNALING CONFIG (persistent WS relay — replaces the old KV-poll Worker; do NOT rebuild) ──
const WS_URL = "wss://desk-signal.saturo-tulum.com";
const ROLE = "sharer";              // this page; the venue is "viewer"
const ICE  = [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }];
// TEXT/VIDEO QUALITY PROFILES (LAN, bandwidth not a constraint). TEXT (default) favors sharpness for reading
// terminals/pages: low framerate, maintain-resolution. VIDEO favors smooth motion: higher framerate,
// maintain-framerate. Capture resolution (2560x1440 ideal) is shared by both; only framerate/encoding differ.
const CAPTURE_WIDTH_IDEAL = 2560, CAPTURE_HEIGHT_IDEAL = 1440;
const CAPTURE_FRAMERATE_MAX = 60;        // ceiling requested from getDisplayMedia; VIDEO mode can use up to this
const PROFILES = {
  text: {
    label: "TEXT", contentHint: "text", frameRateIdeal: 15,
    maxBitrate: 10_000_000, maxFramerate: 15, degradationPreference: "maintain-resolution",
  },
  video: {
    label: "VIDEO", contentHint: "motion", frameRateIdeal: 30,
    maxBitrate: 12_000_000, maxFramerate: 30, degradationPreference: "maintain-framerate",
  },
};
let mode = "text";                       // active profile key; toggled live via the TEXT/VIDEO buttons
// give up (close the socket) if not connected within this window. Default 45s; overridable via ?connectTimeoutMs= for testing.
const CONNECT_TIMEOUT_MS = (function () { const m = /[?&]connectTimeoutMs=(\d+)/.exec(location.search); return m ? +m[1] : 45000; })();
// SIGNALING LIFECYCLE: the WebSocket opens on Share Screen (hello → offer → trickle ICE), the connect-timeout
// window starts once the offer is sent, and stops on pc "connected"/"completed" (socket closed — video is P2P,
// zero further signaling), on the 45s connect timeout, or on Stop/track-ended/unload. No polling anywhere.
console.info(`[share] signaling lifecycle — WS opens on Share Screen, offer sent immediately, ${CONNECT_TIMEOUT_MS / 1000}s connect timeout, socket closes on connected/timeout/Stop/ended/unload.`);

// ── UI ──
const $ = (id) => document.getElementById(id);
const shareBtn = $("share"), stopBtn = $("stop"), msgEl = $("msg"), statusEl = $("status"), dotEl = $("dot"), logEl = $("log"), qualityEl = $("quality");
const modeTextBtn = $("modeText"), modeVideoBtn = $("modeVideo");
$("base").textContent = WS_URL.replace("wss://", "");
function setStatus(text, kind /* '', 'ok','err','warn' */, dot /* '', 'live','wait','err' */) {
  msgEl.textContent = text;
  statusEl.className = "status" + (kind ? " " + kind : "");
  dotEl.className = "dot" + (dot ? " " + dot : "");
}
const stamp = () => new Date().toLocaleTimeString();
function logStep(text) {                                            // visible on-page step log (+ console)
  console.log("[share] " + text);
  if (!logEl) return;
  const lines = (logEl.textContent ? logEl.textContent.split("\n") : []);
  lines.push(`${stamp()}  ${text}`);
  logEl.textContent = lines.slice(-14).join("\n");
  logEl.scrollTop = logEl.scrollHeight;
}

// ── STATE ──
let stream = null, pc = null, ws = null, running = false, connected = false, connectTimeoutT = null;
const pendingIce = [];   // INCOMING viewer ICE that arrived before we set the remote (answer) description

// ── signaling: one persistent WS per Share session; every send is guarded, never throws ──
function wsSend(type, data) { try { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type, data: data ?? null })); } catch (e) { /* socket gone */ } }

// apply a profile's bitrate/framerate cap to a sender (guarded: encodings[] may be empty pre-negotiation; never throws).
async function applyEncodingParams(sender, profile) {
  if (!sender || !sender.track || sender.track.kind !== "video") return;
  try {
    const params = sender.getParameters();
    if (!params.encodings || params.encodings.length === 0) params.encodings = [{}];
    params.encodings[0].maxBitrate = profile.maxBitrate;
    params.encodings[0].maxFramerate = profile.maxFramerate;
    params.degradationPreference = profile.degradationPreference;
    await sender.setParameters(params);
    logStep(`sender params [${profile.label}]: maxBitrate=${profile.maxBitrate}, maxFramerate=${profile.maxFramerate}, degradationPreference=${profile.degradationPreference}`);
  } catch (e) { logStep(`sender setParameters failed: ${e.message || e}`); }
}
function updateQualityInfo(track, profile) {
  profile = profile || PROFILES[mode];
  const s = track && track.getSettings ? track.getSettings() : {};
  const w = s.width || "—", h = s.height || "—", fr = s.frameRate ? Math.round(s.frameRate) : "—";
  qualityEl.textContent = `[${profile.label}] capture ${w}×${h} @${fr}fps · sender cap ${(profile.maxBitrate / 1e6).toFixed(0)}Mbps/${profile.maxFramerate}fps · ${profile.degradationPreference}`;
}
function updateModeButtons() {
  modeTextBtn.classList.toggle("active", mode === "text");
  modeVideoBtn.classList.toggle("active", mode === "video");
}
// live re-apply: contentHint + frameRate constraint on the track, encoding params on the sender (if one exists yet).
// Never renegotiates and never throws — every step is independently guarded so a toggle can never drop the call.
async function applyProfile(newMode) {
  const profile = PROFILES[newMode];
  if (!profile) return;
  mode = newMode;
  updateModeButtons();
  const track = stream && stream.getVideoTracks ? stream.getVideoTracks()[0] : null;
  if (!track) { updateQualityInfo(null, profile); return; }             // mode remembered; nothing live to re-apply yet
  try { track.contentHint = profile.contentHint; } catch (e) {}
  try { await track.applyConstraints({ frameRate: { ideal: profile.frameRateIdeal, max: CAPTURE_FRAMERATE_MAX } }); }
  catch (e) { logStep(`applyConstraints(frameRate) failed: ${e.message || e}`); }
  const sender = pc && pc.getSenders ? pc.getSenders().find((s) => s.track && s.track.kind === "video") : null;
  if (sender) await applyEncodingParams(sender, profile);
  updateQualityInfo(track, profile);
  logStep(`mode → ${profile.label} (live re-apply, no renegotiation)`);
}

// ── build a fresh peer connection with the display tracks, then STRICT ORDER: createOffer → setLocalDescription →
// WS send offer (checked) → only then trickle ICE. ICE gathered before the offer lands is BUFFERED so the offer is
// always the first sharer message (deterministic; not racing behind ICE). ──
async function negotiate() {
  if (pc) { try { pc.close(); } catch (e) {} }
  connected = false;
  let offerSent = false; const outIce = [];                        // buffer outgoing ICE until the offer is sent
  pc = new RTCPeerConnection({ iceServers: ICE });
  const thePc = pc;                                                // guard against a stale handler after teardown/renegotiate
  pc.onicecandidate = (e) => {
    if (!e.candidate) return;
    const c = e.candidate.toJSON ? e.candidate.toJSON() : e.candidate;
    if (offerSent) wsSend("ice", c); else outIce.push(c);          // hold until offer lands, then flush in order
  };
  pc.onconnectionstatechange = () => {
    if (pc !== thePc) return;
    const st = thePc.connectionState;
    logStep(`pc.connectionState = ${st}`);
    if (st === "connected" || st === "completed") markConnected();
    else if (st === "connecting") { if (!connected) setStatus("Connecting to venue…", "warn", "wait"); }
    else if (st === "failed") { teardown("Connection failed — click Share Screen to retry.", "err", "err", "pc connectionState=failed"); }
    else if (st === "disconnected") { if (!connected) setStatus("Connection interrupted — click Share Screen to retry.", "warn", "wait"); else setStatus("Peer disconnected.", "warn", "wait"); }
  };
  pc.oniceconnectionstatechange = () => {                          // some setups report ICE connected before connectionState
    if (pc !== thePc) return;
    const s = thePc.iceConnectionState;
    if (s === "connected" || s === "completed") markConnected();
  };
  const senders = stream.getTracks().map((t) => pc.addTrack(t, stream));

  logStep("createOffer…");
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  logStep("setLocalDescription(offer) ok");
  for (const s of senders) await applyEncodingParams(s, PROFILES[mode]);   // apply the active profile now senders/encodings exist
  // data MUST be the full RTCSessionDescription {type,sdp} — the viewer does setRemoteDescription(data)
  if (!ws || ws.readyState !== WebSocket.OPEN) {                   // FAIL LOUD — no fake "sent"
    setStatus("Offer send FAILED — signaling socket not open.", "err", "err");
    logStep("offer send FAILED — ws not open");
    return false;
  }
  logStep(`WS send offer → {type:"offer",data:{type,sdp}}`);
  wsSend("offer", pc.localDescription);
  offerSent = true;
  logStep("offer sent — relay will forward it to the venue");
  setStatus("Offer sent — waiting for the venue to answer…", "warn", "wait");
  const buffered = outIce.length;                                 // now trickle the buffered ICE — offer-first ordering guaranteed
  for (const c of outIce.splice(0)) wsSend("ice", c);
  logStep(`trickled ${buffered} buffered ICE candidate(s) (offer-first)`);
  return true;
}

// The relay forwards the venue's answer + trickled ICE straight to us over the same socket. We post the offer
// PROACTIVELY on open, so there's no "ready" handshake to wait for.
async function handle(m) {
  if (m.type === "answer") {
    if (pc && !pc.currentRemoteDescription) {
      try { await pc.setRemoteDescription(m.data); logStep("answer received → setRemoteDescription ok"); for (const c of pendingIce.splice(0)) { try { await pc.addIceCandidate(c); } catch (e) {} } }
      catch (e) { logStep(`setRemoteDescription(answer) err: ${e.message || e}`); }
    }
  } else if (m.type === "ice") {                                  // viewer's ICE — apply after we have the answer, else queue
    if (pc && pc.remoteDescription) { try { await pc.addIceCandidate(m.data); } catch (e) {} }
    else pendingIce.push(m.data);
  } else if (m.type === "peer-left") {
    logStep("peer-left received (venue viewer disconnected)");
  }
}

// ── SIGNALING LIFECYCLE ── the socket is only open while a Share session is active; it closes on connect, on the
// 45s connect timeout, and on Stop/track-ended/unload. No polling anywhere.
function markConnected() {
  if (connected) return;
  connected = true;
  if (connectTimeoutT) { clearTimeout(connectTimeoutT); connectTimeoutT = null; }
  closeSocket();                                                   // P2P live now — ZERO further signaling needed
  logStep("pc connected — P2P live, signaling socket closed");
  const label = stream && stream.getVideoTracks && stream.getVideoTracks()[0] ? stream.getVideoTracks()[0].label : "screen";
  setStatus("Sharing — " + label, "ok", "live");
}
function closeSocket() {
  if (!ws) return;
  try { ws.onopen = ws.onmessage = ws.onclose = ws.onerror = null; ws.close(); } catch (e) {}
  ws = null;
}
function onConnectTimeout() {
  connectTimeoutT = null;
  if (connected) return;
  logStep(`CONNECT TIMEOUT (${CONNECT_TIMEOUT_MS / 1000}s) — no connection; giving up`);
  teardown("Connection timed out — click Share Screen to retry.", "err", "err", `${CONNECT_TIMEOUT_MS / 1000}s connect timeout`);
}
// open the signaling WS, send hello once open, and wire message/close handling for the rest of the session.
// Resolves true once open (and hello sent), false if construction/connection fails before opening.
function openSocket() {
  return new Promise((resolve) => {
    let settled = false;
    try { ws = new WebSocket(WS_URL); }
    catch (e) { logStep(`WebSocket construction failed: ${e.message || e}`); resolve(false); return; }
    ws.onopen = () => {
      logStep(`ws open → ${WS_URL}, sending hello (role ${ROLE})`);
      try { ws.send(JSON.stringify({ type: "hello", role: ROLE })); } catch (e) {}
      settled = true; resolve(true);
    };
    ws.onmessage = (e) => { let msg; try { msg = JSON.parse(e.data); } catch (err) { return; } handle(msg); };
    ws.onclose = () => {
      logStep("ws closed");
      if (!settled) { settled = true; resolve(false); return; }     // failed to open at all
      if (running) teardown("Signaling connection lost — click Share Screen to retry.", "err", "err", "ws closed unexpectedly");
    };
    ws.onerror = () => { logStep("ws error"); };
  });
}

// ── SHARE ──
shareBtn.addEventListener("click", async () => {
  if (running) return;
  logEl.textContent = "";
  setStatus("Requesting screen…", "", "wait");
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: {
        width: { ideal: CAPTURE_WIDTH_IDEAL }, height: { ideal: CAPTURE_HEIGHT_IDEAL },
        frameRate: { ideal: PROFILES[mode].frameRateIdeal, max: CAPTURE_FRAMERATE_MAX },
      },
      audio: false,
    });
  } catch (e) {
    setStatus("Screen share cancelled or blocked.", "warn", ""); stream = null; return;   // user cancelled the picker
  }
  running = true; connected = false; pendingIce.length = 0;
  shareBtn.disabled = true; stopBtn.disabled = false;
  logStep(`screen captured (${stream.getVideoTracks()[0]?.label || "screen"})`);
  await applyProfile(mode);                              // contentHint + frameRate for the active mode (default TEXT)

  // if the user stops sharing via the browser's own "Stop sharing" UI → tear down
  stream.getVideoTracks().forEach((t) => { t.addEventListener("ended", onTrackEnded); });

  setStatus("Connecting to signaling relay…", "warn", "wait");
  const opened = await openSocket();
  if (!running) return;                                  // user hit Stop during the socket-open await
  if (!opened) { teardown("Signaling socket FAILED to open — check desk-signal.saturo-tulum.com.", "err", "err", "ws failed to open"); return; }

  // SEND THE OFFER FIRST (proactive — the relay forwards it to the venue immediately), then arm the connect timeout.
  const posted = await negotiate();
  if (!running) return;                                  // stopped mid-negotiate
  if (!posted) { teardown(null, "", "", "offer send failed"); return; }   // keep the offer-error status; re-enable Share

  connectTimeoutT = setTimeout(onConnectTimeout, CONNECT_TIMEOUT_MS);
  logStep(`connect timeout armed — ${CONNECT_TIMEOUT_MS / 1000}s`);
});

// Full teardown: clear the connect timeout, close the socket + pc, stop tracks, re-enable Share. Used by Stop, the
// connect timeout, socket/offer failure, and a hard pc failure. `msg===null` keeps the status.
function teardown(msg, kind, dot, reason) {
  const wasActive = running || ws || pc || stream;
  running = false; connected = false;
  if (connectTimeoutT) { clearTimeout(connectTimeoutT); connectTimeoutT = null; }
  closeSocket();
  if (pc) { try { pc.close(); } catch (e) {} pc = null; }
  if (stream) { try { stream.getTracks().forEach((t) => t.stop()); } catch (e) {} stream = null; }
  pendingIce.length = 0;
  shareBtn.disabled = false; stopBtn.disabled = true;
  if (msg !== undefined && msg !== null) setStatus(msg, kind || "", dot || "");
  updateQualityInfo(null, PROFILES[mode]);
  if (wasActive) logStep(`teardown — ${reason || "teardown"}`);
}

function stopSharing() { teardown("Stopped. Click “Share Screen” to share again.", "", "", "Stop clicked"); }
function onTrackEnded() { teardown("Screen sharing ended. Click “Share Screen” to share again.", "", "", "screen-share track ended"); }
stopBtn.addEventListener("click", stopSharing);

// ── TEXT/VIDEO TOGGLE — applies live to the running track/sender; never renegotiates, never throws ──
modeTextBtn.addEventListener("click", () => applyProfile("text"));
modeVideoBtn.addEventListener("click", () => applyProfile("video"));
updateModeButtons();
updateQualityInfo(null, PROFILES[mode]);   // initial idle reading

// clean up if the tab closes — close the socket, close the pc, stop tracks
window.addEventListener("beforeunload", () => {
  try { if (ws) { ws.onclose = null; ws.close(); } } catch (e) {}
  try { if (stream) stream.getTracks().forEach((t) => t.stop()); } catch (e) {}
  try { if (pc) pc.close(); } catch (e) {}
});

// getDisplayMedia requires a secure context (https or localhost/file). Warn early if unavailable.
if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
  shareBtn.disabled = true;
  setStatus("getDisplayMedia unavailable — open this page over http://localhost or https.", "err", "err");
}
</script>
</body>
</html>
