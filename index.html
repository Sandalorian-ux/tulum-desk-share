<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tulum DESK — Screen Share</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 800px at 50% -10%, #10202b 0%, #070a0e 60%, #04060a 100%);
    color: #eaffff; font: 16px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
  }
  .card {
    width: min(560px, 92vw); padding: 34px 30px 28px; border-radius: 18px;
    background: rgba(12, 20, 28, 0.86); border: 1px solid #16323f;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center;
  }
  h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 0.5px; }
  h1 .accent { color: #5fb8cc; }
  .sub { margin: 0 0 22px; color: #7fa6b3; font-size: 13px; }
  button {
    font: 600 17px system-ui, sans-serif; color: #eaffff; cursor: pointer;
    border: 1px solid #5fb8cc; border-radius: 12px; padding: 15px 22px; margin: 6px;
    background: linear-gradient(#164254, #0e2c3a); transition: transform .08s, filter .15s;
    min-width: 170px;
  }
  button:hover { filter: brightness(1.15); }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: default; filter: none; }
  #stop { border-color: #7a3a3a; background: linear-gradient(#4a1f1f, #331616); }
  .status {
    margin-top: 20px; padding: 12px 14px; border-radius: 10px; font-size: 14px;
    background: #0a1620; border: 1px solid #16323f; min-height: 20px;
    color: #8fd6e6; word-break: break-word;
  }
  .status.ok { color: #7fe6a8; border-color: #1f6b45; }
  .status.err { color: #ff9a9a; border-color: #7a2323; }
  .status.warn { color: #ffd98f; border-color: #7a6423; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; vertical-align: middle; background: #446; }
  .dot.live { background: #35d67a; box-shadow: 0 0 8px #35d67a; }
  .dot.wait { background: #e0c05a; }
  .dot.err { background: #d65a5a; }
  .meta { margin-top: 14px; font-size: 11px; color: #557; }
  code { color: #9fd; background: #0c1a24; padding: 1px 5px; border-radius: 4px; }
  .log {
    margin-top: 12px; font: 11px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; color: #6fa88f;
    text-align: left; max-height: 150px; overflow-y: auto; background: #08131b; border: 1px solid #12303a;
    border-radius: 8px; padding: 8px 10px; white-space: pre-wrap; word-break: break-word;
  }
  .log:empty { display: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Tulum <span class="accent">DESK</span> — Screen Share</h1>
    <p class="sub">Share this machine's screen into the Tulum venue (peer-to-peer, LAN).</p>
    <div>
      <button id="share">Share Screen</button>
      <button id="stop" disabled>Stop</button>
    </div>
    <div id="status" class="status"><span class="dot" id="dot"></span><span id="msg">Idle — click “Share Screen” to begin.</span></div>
    <div class="meta">room <code id="room">tulum-desk</code> · role <code>sharer</code> · signal <code id="base">…</code></div>
    <div class="meta" id="quality">capture — · sender cap —</div>
    <div id="log" class="log"></div>
  </div>

<script>
"use strict";
// ── SIGNALING CONFIG (the fixed-room mailbox Worker — already live) ──
const SIGNAL_BASE = "https://tulum-desk-signal.hartwell.workers.dev";
const ROOM = "tulum-desk";          // fixed shared room code (auto-pair, no pin)
const ROLE = "sharer";              // this page; the venue is "viewer"
const ICE  = [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }];
const POLL_MS = 700;                // inbox poll cadence DURING the connect handshake only
// TEXT-SHARPNESS TUNING (LAN, bandwidth not a constraint): capture is high-res/low-framerate (static text
// reads better than smooth motion here), and the sender's bitrate cap is raised so the encoder never has to
// trade sharpness for bitrate at 1080p+. degradationPreference keeps resolution over framerate under load.
const CAPTURE_WIDTH_IDEAL = 2560, CAPTURE_HEIGHT_IDEAL = 1440;
const CAPTURE_FRAMERATE_IDEAL = 15, CAPTURE_FRAMERATE_MAX = 30;
const SENDER_MAX_BITRATE = 10_000_000;   // bps — crisp 1080p+ text over LAN
const SENDER_MAX_FRAMERATE = 30;
// give up (stop polling) if not connected within this window. Default 45s; overridable via ?connectTimeoutMs= for testing.
const CONNECT_TIMEOUT_MS = (function () { const m = /[?&]connectTimeoutMs=(\d+)/.exec(location.search); return m ? +m[1] : 45000; })();
// POLL LIFECYCLE (KV-read discipline): polling STARTS only AFTER the offer is posted; STOPS on pc
// "connected"/"completed", on the 45s connect timeout, and on Stop / track-ended / page-unload. It NEVER polls
// before the offer and NEVER polls after the peer connects — the video is pure P2P then, so zero further reads.
console.info('[share] poll lifecycle — START: after offer posted. STOP: pc connected|completed, ' + (CONNECT_TIMEOUT_MS / 1000) + 's timeout, Stop/ended/unload. No pre-offer polling, no post-connect polling.');

// ── UI ──
const $ = (id) => document.getElementById(id);
const shareBtn = $("share"), stopBtn = $("stop"), msgEl = $("msg"), statusEl = $("status"), dotEl = $("dot"), logEl = $("log"), qualityEl = $("quality");
$("base").textContent = SIGNAL_BASE.replace("https://", "");
const SHARE_URL = `${SIGNAL_BASE}/signal/${ROOM}/${ROLE}`;          // EXACT post target: …/signal/tulum-desk/sharer
function setStatus(text, kind /* '', 'ok','err','warn' */, dot /* '', 'live','wait','err' */) {
  msgEl.textContent = text;
  statusEl.className = "status" + (kind ? " " + kind : "");
  dotEl.className = "dot" + (dot ? " " + dot : "");
}
const stamp = () => new Date().toLocaleTimeString();
function logStep(text) {                                            // visible on-page step log (+ console)
  console.log("[share] " + text);
  if (!logEl) return;
  const lines = (logEl.textContent ? logEl.textContent.split("\n") : []);
  lines.push(`${stamp()}  ${text}`);
  logEl.textContent = lines.slice(-14).join("\n");
  logEl.scrollTop = logEl.scrollHeight;
}

// ── STATE ──
let stream = null, pc = null, running = false, polling = false, since = 0, connected = false;
let pollT = null, connectTimeoutT = null;
const pendingIce = [];   // INCOMING viewer ICE that arrived before we set the remote (answer) description

// ── signaling helpers ── every POST is CHECKED: returns {ok,status,seq,error}; failures are surfaced, never silent
async function post(type, data) {
  try {
    const r = await fetch(SHARE_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ type, data: data ?? null }) });
    let body = null; try { body = await r.json(); } catch (e) { /* non-JSON */ }
    return { ok: r.ok && (!body || body.ok !== false), status: r.status, seq: body && body.seq, body };
  } catch (e) { return { ok: false, status: 0, error: e.message || String(e) }; }
}
async function resetRoom() {
  try { const r = await fetch(`${SIGNAL_BASE}/signal/${ROOM}/reset`, { method: "POST" }); return r.ok; }
  catch (e) { logStep(`reset FAILED: ${e.message || e}`); return false; }
}
async function inbox() {
  try { const r = await fetch(`${SIGNAL_BASE}/signal/${ROOM}/${ROLE}/inbox?since=${since}`); return r.ok ? await r.json() : null; }
  catch (e) { return null; }
}
async function postIce(candidate) {                                // full candidate object (viewer does addIceCandidate(data))
  const r = await post("ice", candidate);
  if (!r.ok) logStep(`ICE POST failed (HTTP ${r.status}${r.error ? ": " + r.error : ""})`);
}

// raise the video sender's bitrate cap for crisp text (guarded: encodings[] may be empty pre-negotiation).
async function applyEncodingParams(sender) {
  if (!sender || !sender.track || sender.track.kind !== "video") return;
  try {
    const params = sender.getParameters();
    if (!params.encodings || params.encodings.length === 0) params.encodings = [{}];
    params.encodings[0].maxBitrate = SENDER_MAX_BITRATE;
    params.encodings[0].maxFramerate = SENDER_MAX_FRAMERATE;
    params.degradationPreference = "maintain-resolution";         // keep sharpness, let framerate drop under load
    await sender.setParameters(params);
    logStep(`sender params: maxBitrate=${SENDER_MAX_BITRATE}, maxFramerate=${SENDER_MAX_FRAMERATE}, degradationPreference=maintain-resolution`);
    updateQualityInfo(sender.track);
  } catch (e) { logStep(`sender setParameters failed: ${e.message || e}`); }
}
function updateQualityInfo(track) {
  const s = track.getSettings ? track.getSettings() : {};
  const w = s.width || "?", h = s.height || "?", fr = s.frameRate ? Math.round(s.frameRate) : "?";
  qualityEl.textContent = `capture ${w}×${h} @${fr}fps · sender cap ${(SENDER_MAX_BITRATE / 1e6).toFixed(0)}Mbps/${SENDER_MAX_FRAMERATE}fps · maintain-resolution`;
}

// ── build a fresh peer connection with the display tracks, then STRICT ORDER: createOffer → setLocalDescription →
// POST offer (checked) → only then trickle ICE. ICE gathered before the offer lands is BUFFERED so the offer is
// always the first sharer message (deterministic; not racing behind ICE). ──
async function negotiate() {
  if (pc) { try { pc.close(); } catch (e) {} }
  connected = false;
  let offerPosted = false; const outIce = [];                      // buffer outgoing ICE until the offer is posted
  pc = new RTCPeerConnection({ iceServers: ICE });
  const thePc = pc;                                                // guard against a stale handler after teardown/renegotiate
  pc.onicecandidate = (e) => {
    if (!e.candidate) return;
    const c = e.candidate.toJSON ? e.candidate.toJSON() : e.candidate;
    if (offerPosted) postIce(c); else outIce.push(c);              // hold until offer lands, then flush in order
  };
  pc.onconnectionstatechange = () => {
    if (pc !== thePc) return;
    const st = thePc.connectionState;
    logStep(`pc.connectionState = ${st}`);
    if (st === "connected" || st === "completed") markConnected();
    else if (st === "connecting") { if (!connected) setStatus("Connecting to venue…", "warn", "wait"); }
    else if (st === "failed") { teardown("Connection failed — click Share Screen to retry.", "err", "err", "pc connectionState=failed"); }
    else if (st === "disconnected") { if (!connected) setStatus("Connection interrupted — click Share Screen to retry.", "warn", "wait"); else setStatus("Peer disconnected.", "warn", "wait"); }
  };
  pc.oniceconnectionstatechange = () => {                          // some setups report ICE connected before connectionState
    if (pc !== thePc) return;
    const s = thePc.iceConnectionState;
    if (s === "connected" || s === "completed") markConnected();
  };
  const senders = stream.getTracks().map((t) => pc.addTrack(t, stream));

  logStep("createOffer…");
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  logStep("setLocalDescription(offer) ok");
  for (const s of senders) await applyEncodingParams(s);           // raise bitrate cap now the sender/encodings exist
  // data MUST be the full RTCSessionDescription {type,sdp} — the viewer does setRemoteDescription(data)
  logStep(`POST ${SHARE_URL}  body={type:"offer",data:{type,sdp}}`);
  const res = await post("offer", pc.localDescription);
  if (!res.ok) {                                                   // FAIL LOUD — no fake "sent"
    setStatus(`Offer POST FAILED — HTTP ${res.status}${res.error ? " (" + res.error + ")" : ""}. Check the signal URL/CORS.`, "err", "err");
    logStep(`offer POST FAILED → HTTP ${res.status}${res.error ? " " + res.error : ""}`);
    return false;
  }
  offerPosted = true;
  logStep(`offer POST ok → {ok:true, seq:${res.seq}} — offer is in the mailbox`);
  setStatus("Offer sent — waiting for the venue to answer…", "warn", "wait");
  const buffered = outIce.length;                                 // now trickle the buffered ICE — offer-first ordering guaranteed
  for (const c of outIce.splice(0)) await postIce(c);
  logStep(`trickled ${buffered} buffered ICE candidate(s) (offer-first)`);
  return true;
}

// The venue viewer reads our offer from the mailbox (reset-safe, from seq 0) and answers + trickles ICE. We only
// need to process those. "ready" is ignored — we post the offer PROACTIVELY (so polling starts after the offer),
// so we never need a "ready" to trigger it.
async function handle(m) {
  if (m.type === "answer") {
    if (pc && !pc.currentRemoteDescription) {
      try { await pc.setRemoteDescription(m.data); logStep("answer received → setRemoteDescription ok"); for (const c of pendingIce.splice(0)) { try { await pc.addIceCandidate(c); } catch (e) {} } }
      catch (e) { logStep(`setRemoteDescription(answer) err: ${e.message || e}`); }
    }
  } else if (m.type === "ice") {                                  // viewer's ICE — apply after we have the answer, else queue
    if (pc && pc.remoteDescription) { try { await pc.addIceCandidate(m.data); } catch (e) {} }
    else pendingIce.push(m.data);
  }
}

// ── POLLING DISCIPLINE ── inbox is polled ONLY during the connect window (after the offer, until connected/timeout)
function markConnected() {
  if (connected) return;
  connected = true;
  stopPolling("pc connected — P2P live, ZERO further signaling");
  const label = stream && stream.getVideoTracks && stream.getVideoTracks()[0] ? stream.getVideoTracks()[0].label : "screen";
  setStatus("Sharing — " + label, "ok", "live");
}
function startPolling() {
  if (polling) return;
  polling = true; since = 0;
  logStep(`polling STARTED — inbox @${POLL_MS}ms, ${CONNECT_TIMEOUT_MS / 1000}s connect timeout (offer already posted)`);
  connectTimeoutT = setTimeout(onConnectTimeout, CONNECT_TIMEOUT_MS);
  loop();
}
function stopPolling(reason) {
  const was = polling || pollT || connectTimeoutT;
  polling = false;
  if (pollT) { clearTimeout(pollT); pollT = null; }
  if (connectTimeoutT) { clearTimeout(connectTimeoutT); connectTimeoutT = null; }
  if (was) logStep(`polling STOPPED — ${reason}`);
}
function onConnectTimeout() {
  connectTimeoutT = null;
  if (connected) return;
  logStep(`CONNECT TIMEOUT (${CONNECT_TIMEOUT_MS / 1000}s) — no connection; giving up`);
  teardown("Connection timed out — click Share Screen to retry.", "err", "err", `${CONNECT_TIMEOUT_MS / 1000}s connect timeout`);
}
async function pollOnce() {
  if (!polling) return;
  const res = await inbox();
  if (!polling) return;                                           // may have connected/stopped during the await
  if (res && Array.isArray(res.messages)) { for (const m of res.messages) { await handle(m); since = m.seq; } }   // ALL messages, in order
}
function loop() { if (!polling) return; pollOnce().finally(() => { if (polling) pollT = setTimeout(loop, POLL_MS); }); }

// ── SHARE ──
shareBtn.addEventListener("click", async () => {
  if (running) return;
  logEl.textContent = "";
  setStatus("Requesting screen…", "", "wait");
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: {
        width: { ideal: CAPTURE_WIDTH_IDEAL }, height: { ideal: CAPTURE_HEIGHT_IDEAL },
        frameRate: { ideal: CAPTURE_FRAMERATE_IDEAL, max: CAPTURE_FRAMERATE_MAX },
      },
      audio: false,
    });
  } catch (e) {
    setStatus("Screen share cancelled or blocked.", "warn", ""); stream = null; return;   // user cancelled the picker
  }
  stream.getVideoTracks().forEach((t) => { t.contentHint = "text"; });   // preserve sharpness over motion smoothness
  running = true; connected = false; since = 0; pendingIce.length = 0;
  shareBtn.disabled = true; stopBtn.disabled = false;
  logStep(`screen captured (${stream.getVideoTracks()[0]?.label || "screen"})`);
  if (stream.getVideoTracks()[0]) updateQualityInfo(stream.getVideoTracks()[0]);   // initial reading; sender cap applied after negotiate

  // if the user stops sharing via the browser's own "Stop sharing" UI → tear down
  stream.getVideoTracks().forEach((t) => { t.addEventListener("ended", onTrackEnded); });

  const ok = await resetRoom();                          // clear any stale handshake so this session starts fresh
  logStep(`room /reset ${ok ? "ok" : "failed"}`);
  if (!running) return;                                  // user hit Stop during the reset await

  // POST THE OFFER FIRST (proactive — the viewer reads it from the mailbox), THEN start polling for the answer.
  // No pre-offer idle polling; polling begins only once the offer is in the mailbox.
  const posted = await negotiate();
  if (!running) return;                                  // stopped mid-negotiate
  if (!posted) { teardown(null, "", "", "offer POST failed"); return; }   // keep the offer-error status; re-enable Share

  startPolling();
});

// Full teardown: stop polling + clear the connect timeout, close the pc, stop tracks, reset the room, re-enable
// Share. Used by Stop, the connect timeout, offer failure, and a hard pc failure. `msg===null` keeps the status.
function teardown(msg, kind, dot, reason) {
  const wasActive = running || polling || pc || stream;
  running = false; connected = false;
  stopPolling(reason || "teardown");
  if (pc) { try { pc.close(); } catch (e) {} pc = null; }
  if (stream) { try { stream.getTracks().forEach((t) => t.stop()); } catch (e) {} stream = null; }
  pendingIce.length = 0;
  if (wasActive) resetRoom();                            // clear the mailbox for the next session
  shareBtn.disabled = false; stopBtn.disabled = true;
  if (msg !== undefined && msg !== null) setStatus(msg, kind || "", dot || "");
  qualityEl.textContent = "capture — · sender cap —";
}

function stopSharing() { teardown("Stopped. Click “Share Screen” to share again.", "", "", "Stop clicked"); }
function onTrackEnded() { teardown("Screen sharing ended. Click “Share Screen” to share again.", "", "", "screen-share track ended"); }
stopBtn.addEventListener("click", stopSharing);

// clean up if the tab closes — stop polling, close the pc, stop tracks, best-effort reset (fire-and-forget beacon)
window.addEventListener("beforeunload", () => {
  stopPolling("page unload");
  try { if (stream) stream.getTracks().forEach((t) => t.stop()); } catch (e) {}
  try { if (pc) pc.close(); } catch (e) {}
  try { if (navigator.sendBeacon) navigator.sendBeacon(`${SIGNAL_BASE}/signal/${ROOM}/reset`); } catch (e) {}
});

// getDisplayMedia requires a secure context (https or localhost/file). Warn early if unavailable.
if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
  shareBtn.disabled = true;
  setStatus("getDisplayMedia unavailable — open this page over http://localhost or https.", "err", "err");
}
</script>
</body>
</html>
